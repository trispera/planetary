{{- if .Values.networkPolicies.enabled }}
# Default deny ingress and egress for task pods
{{- if not (.Capabilities.APIVersions.Has "security.openshift.io/v1") }}
kind: NetworkPolicy
apiVersion: networking.k8s.io/v1
metadata:
  name: default-deny-all
  namespace: {{ .Values.tasks.namespace }}
spec:
  policyTypes:
    - Ingress
    - Egress
{{- end }}
---
# Allow accepted egress traffic from task pods
{{- if not (.Capabilities.APIVersions.Has "security.openshift.io/v1") }}
kind: NetworkPolicy
apiVersion: networking.k8s.io/v1
metadata:
  name: allow-exceptions
  namespace: {{ .Values.tasks.namespace }}
spec:
  policyTypes:
    - Egress
  egress:
    # Allow DNS to kube-dns
    - to:
      - namespaceSelector:
          matchLabels:
            kubernetes.io/metadata.name: kube-system
        podSelector:
          matchLabels:
            k8s-app: kube-dns
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP

    # Allow TCP to the orchestrator
    - to:
      - namespaceSelector:
          matchLabels:
            kubernetes.io/metadata.name: {{ .Release.Namespace }}
        podSelector:
          matchLabels:
            app.kubernetes.io/component: orchestrator
      ports:
        - port: {{ .Values.orchestrator.service.port }}
          protocol: TCP

    # Custom egress rules
    {{- with .Values.networkPolicies.egressRules }}
      {{ toYaml . | nindent 4 }}
    {{- end }}
{{- end }}
{{- end }}
